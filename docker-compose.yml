version: "3.9"

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend — FastAPI + LangChain + Selenium
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mindforge-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    depends_on:
      - selenium
    networks:
      - mindforge-net

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend — React / Vite (dev) or nginx (prod)
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mindforge-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - mindforge-net

  # ──────────────────────────────────────────────────────────────────────────
  # Selenium Grid — remote Chrome for browser automation
  # ──────────────────────────────────────────────────────────────────────────
  selenium:
    image: selenium/standalone-chrome:latest
    container_name: mindforge-selenium
    restart: unless-stopped
    ports:
      - "4444:4444"
      - "7900:7900"   # VNC viewer for debugging (password: secret)
    shm_size: "2gb"
    environment:
      - SE_NODE_MAX_SESSIONS=3
    networks:
      - mindforge-net

  # ──────────────────────────────────────────────────────────────────────────
  # Redis — task queue + event caching (optional)
  # ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mindforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - mindforge-net

networks:
  mindforge-net:
    driver: bridge

volumes:
  logs:
